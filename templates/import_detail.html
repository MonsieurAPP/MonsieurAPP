{% extends "base.html" %}
{% block title %}Stato import{% endblock %}
{% block content %}
<div class="topbar">
  <a href="/" class="button button-secondary">Torna alla home</a>
  <div class="muted-small">Job {{ job.id[:8] }}</div>
</div>

{% include "partials/service_tools.html" %}

{% include "partials/job_status.html" %}
<script>
  const JOB_ID = {{ job.id|tojson }};

  function getDetailsStorageKey(detailId) {
    return `mcDetailState:${JOB_ID}:${detailId}`;
  }

  function restorePersistentDetailsState() {
    document.querySelectorAll("details[data-persistent-details]").forEach((node) => {
      const detailId = node.dataset.persistentDetails;
      const isOpen = window.localStorage.getItem(getDetailsStorageKey(detailId)) === "1";
      node.open = isOpen;
    });
  }

  function bindPersistentDetailsState() {
    document.querySelectorAll("details[data-persistent-details]").forEach((node) => {
      if (node.dataset.detailsBound === "1") {
        return;
      }

      node.addEventListener("toggle", () => {
        const detailId = node.dataset.persistentDetails;
        window.localStorage.setItem(getDetailsStorageKey(detailId), node.open ? "1" : "0");
      });
      node.dataset.detailsBound = "1";
    });
  }

  function applyPageState() {
    restorePersistentDetailsState();
    bindPersistentDetailsState();
  }

  function copyText(value) {
    navigator.clipboard.writeText(value || "");
  }

  function copyFromTarget(targetId) {
    const node = document.getElementById(targetId);
    if (!node) return;
    const text = node.value !== undefined ? node.value : node.innerText;
    copyText(text);
  }

  document.addEventListener("DOMContentLoaded", applyPageState);
  document.body.addEventListener("htmx:afterSwap", applyPageState);
</script>
{% endblock %}

<div class="topbar">
  <a href="/" class="button button-secondary">Torna alla home</a>
  <div class="muted-small">Job {{ job.id[:8] }}</div>
</div>

{% include "partials/job_status.html" %}
<script>
  function copyFromTarget(targetId) {
    const node = document.getElementById(targetId);
    if (!node) return;
    const text = node.value !== undefined ? node.value : node.innerText;
    navigator.clipboard.writeText(text);
  }
</script>
{% endblock %}
